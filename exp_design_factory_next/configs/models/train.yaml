base_model: Qwen/Qwen2.5-7B-Instruct
sft_output_dir: training/checkpoints/qwen25_7b_sft_expdesign
dpo_output_dir: training/checkpoints/qwen25_7b_dpo_expdesign

training:
  max_seq_length: 3072
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 2e-4
  num_train_epochs: 2
  logging_steps: 10
  save_steps: 200
  bf16: true

lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
